<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="Styles/style.css">
  <link rel="icon" type="image/x-icon" href="Images/diagram.png">

<body>
  <div class="header">
    <div class="header-content">
      <h1 class="logo">RPS</h1>
      <ul class="links">

  </div>
  <div class="content">
    <h3 class="title">ROCK PAPER SCISSOR</h3>
    <p class="round">Start Game</p>

      <button class="rock">🪨</button>
      <button class="paper">📄</button>

    <div class="score">

      <p class="computer-score">Computer Score: 0</p>
